AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: ArchFlow - Voice-first AI architecture diagram designer

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
  JwtSecret:
    Type: String
    Default: archflow-dev-jwt-secret-change-in-prod
    NoEcho: true

Globals:
  Function:
    Runtime: python3.12
    Architectures:
      - arm64
    Timeout: 60
    MemorySize: 1024
    Tracing: Active
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        CONVERSATION_TABLE_NAME: !Ref ConversationsTable
        UPLOADS_BUCKET: !Ref UploadsBucket
        EXPORTS_BUCKET: !Ref ExportsBucket
        BEDROCK_MODEL_LITE: us.amazon.nova-2-lite-v1:0
        BEDROCK_MODEL_SONIC: us.amazon.nova-2-sonic-v1:0
        GITHUB_TOKEN: ''
        LOG_LEVEL: INFO
        USERS_TABLE_NAME: !Ref UsersTable
        JWT_SECRET: !Ref JwtSecret

Resources:
  # ─── WebSocket API (text chat + file upload) ───
  WebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub archflow-websocket-${Environment}
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: "$request.body.action"

  WebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref WebSocketApi
      StageName: !Ref Environment
      AutoDeploy: true

  ConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $connect
      AuthorizationType: NONE
      Target: !Sub integrations/${WebSocketIntegration}

  DisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $disconnect
      Target: !Sub integrations/${WebSocketIntegration}

  DefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $default
      RouteResponseSelectionExpression: "$default"
      Target: !Sub integrations/${WebSocketIntegration}

  DefaultRouteResponse:
    Type: AWS::ApiGatewayV2::RouteResponse
    Properties:
      ApiId: !Ref WebSocketApi
      RouteId: !Ref DefaultRoute
      RouteResponseKey: $default

  WebSocketIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WebSocketFunction.Arn}/invocations

  # ─── REST API ───
  RestApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub archflow-rest-${Environment}
      StageName: !Ref Environment
      Cors:
        AllowOrigin: "'*'"
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"

  # ─── Lambda Functions ───
  WebSocketFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub archflow-websocket-${Environment}
      Handler: src.handlers.websocket.lambda_handler
      CodeUri: .
      MemorySize: 2048
      Timeout: 300
      Environment:
        Variables:
          REPO_ANALYZER_FUNCTION_NAME: !Ref RepoAnalyzerFunction
      Policies:
        - AmazonBedrockFullAccess
        - DynamoDBCrudPolicy:
            TableName: !Ref ConversationsTable
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable
        - S3CrudPolicy:
            BucketName: !Ref UploadsBucket
        - Statement:
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource: !GetAtt RepoAnalyzerFunction.Arn

  WebSocketFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref WebSocketFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*

  RepoAnalyzerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub archflow-repo-analyzer-${Environment}
      Handler: src.handlers.repo_analyzer_handler.lambda_handler
      CodeUri: .
      MemorySize: 1024
      Timeout: 300
      EphemeralStorage:
        Size: 1024
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ConversationsTable
        - S3CrudPolicy:
            BucketName: !Ref UploadsBucket

  FileUploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub archflow-file-upload-${Environment}
      Handler: src.handlers.file_upload.lambda_handler
      CodeUri: .
      MemorySize: 1024
      Timeout: 300
      Policies:
        - AmazonBedrockFullAccess
        - DynamoDBCrudPolicy:
            TableName: !Ref ConversationsTable
        - S3CrudPolicy:
            BucketName: !Ref UploadsBucket
      Events:
        Upload:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /upload
            Method: POST

  ExportFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub archflow-export-${Environment}
      Handler: src.handlers.export.lambda_handler
      CodeUri: .
      MemorySize: 1024
      Timeout: 60
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ConversationsTable
        - S3CrudPolicy:
            BucketName: !Ref ExportsBucket
      Events:
        Export:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /export
            Method: POST
        Share:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /share
            Method: POST

  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub archflow-auth-${Environment}
      Handler: src.handlers.auth.lambda_handler
      CodeUri: .
      MemorySize: 512
      Timeout: 10
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Events:
        Signup:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /auth/signup
            Method: POST
        Login:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /auth/login
            Method: POST
        Me:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /auth/me
            Method: GET

  # ─── DynamoDB ───
  ConversationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub archflow-conversations-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: session_id
          AttributeType: S
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: last_activity
          AttributeType: S
      KeySchema:
        - AttributeName: session_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: user-conversations-index
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
            - AttributeName: last_activity
              KeyType: RANGE
          Projection:
            ProjectionType: INCLUDE
            NonKeyAttributes:
              - title
              - created_at
              - current_diagram
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub archflow-users-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: email
          KeyType: HASH

  # ─── S3 Buckets ───
  UploadsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub archflow-uploads-${Environment}-${AWS::AccountId}
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldUploads
            Status: Enabled
            ExpirationInDays: 7
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ["*"]
            AllowedMethods: [GET, PUT, POST]
            AllowedOrigins: ["*"]
            MaxAge: 3600

  ExportsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub archflow-exports-${Environment}-${AWS::AccountId}
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldExports
            Status: Enabled
            ExpirationInDays: 30

  # ─── Frontend Static Hosting ───
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub archflow-frontend-${Environment}-${AWS::AccountId}
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub arn:aws:s3:::${FrontendBucket}/*

  # ─── Voice Server IAM Roles (for ECS Fargate + App Runner) ───
  VoiceServerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub archflow-voice-server-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - tasks.apprunner.amazonaws.com
                - ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonBedrockFullAccess
      Policies:
        - PolicyName: VoiceServerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                Resource:
                  - !GetAtt ConversationsTable.Arn
                  - !Sub ${ConversationsTable.Arn}/index/*
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource:
                  - !Sub arn:aws:s3:::${UploadsBucket}/*

  VoiceServerAccessRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub archflow-voice-ecr-access-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: build.apprunner.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSAppRunnerServicePolicyForECRAccess

Outputs:
  WebSocketUrl:
    Description: WebSocket API URL (text chat)
    Value: !Sub wss://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}

  RestApiUrl:
    Description: REST API URL
    Value: !Sub https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}

  ConversationsTableName:
    Description: DynamoDB table name
    Value: !Ref ConversationsTable

  UsersTableName:
    Description: Users DynamoDB table name
    Value: !Ref UsersTable

  FrontendUrl:
    Description: Frontend website URL
    Value: !GetAtt FrontendBucket.WebsiteURL

  VoiceServerRoleArn:
    Description: Voice server IAM role ARN (for App Runner instance role)
    Value: !GetAtt VoiceServerRole.Arn

  VoiceServerAccessRoleArn:
    Description: Voice server ECR access role ARN (for App Runner source config)
    Value: !GetAtt VoiceServerAccessRole.Arn
